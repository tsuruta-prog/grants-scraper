name: scrape-grants

# 毎朝 JST 7:00 = UTC 22:00 (前日)
on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:  # 手動実行も可能

permissions:
  contents: write  # auto commit のため

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TZ: Asia/Tokyo
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          python -m playwright install --with-deps chromium

      - name: Run scraper
        run: |
          python main.py
        continue-on-error: true  # スクレイピング失敗でも commit ステップは走らせる

      - name: Commit & push results
        run: |
          git config --local user.name  "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/grants.xlsx logs/ || true
          if git diff --cached --quiet; then
            echo "変更なし。コミットスキップ。"
          else
            git commit -m "chore(scrape): auto update $(date +'%Y-%m-%d %H:%M %Z')"
            git push
          fi

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs
          path: logs/
          retention-days: 14
